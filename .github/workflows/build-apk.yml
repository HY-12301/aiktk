name: Build APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o tools.zip
          unzip -q tools.zip && mv cmdline-tools latest && rm tools.zip
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" --channel=0

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Copy web assets
        run: |
          mkdir -p android/app/src/main/assets
          cp index.html android/app/src/main/assets/
          cp all_questions.json.gz android/app/src/main/assets/ 2>/dev/null || true
          cp ai_tutor.json android/app/src/main/assets/ 2>/dev/null || true

      - name: Build Debug APK
        run: |
          cd android
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aiktk-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
